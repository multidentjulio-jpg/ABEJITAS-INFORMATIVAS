      "html": "<p data-path-to-node=\"10\">La comunicación afectiva se define como la capacidad de sintonizar de manera empática con las necesidades emocionales y cognitivas del niño o niña. No se limita al lenguaje verbal; abarca el tono de voz, la mirada, el contacto físico y la capacidad de respuesta oportuna (lo que en psicología del desarrollo llamamos <i data-path-to-node=\"10\" data-index-in-node=\"317\">sensibilidad parental</i>).</p><blockquote data-path-to-node=\"11\"><p data-path-to-node=\"11,0\">\"La forma en que nos comunicamos con nuestros niños se convierte en su voz interna\".\n— <i data-path-to-node=\"11,0\" data-index-in-node=\"87\">Peggy O'Mara</i></p></blockquote><p data-path-to-node=\"12\">Cuando un bebé llora y un adulto lo calma con voz suave, o cuando un niño de tres años se frustra y encuentra contención en lugar de castigo, se está consolidando un <b data-path-to-node=\"12\" data-index-in-node=\"166\">apego seguro</b>.</p>"

        const block = currentBlocks[idx]; currentEditingBlockIndex = idx;
        blockWidthInput.value = block.width || 'auto'; blockHeightInput.value = block.height || 'auto';
        selectedStyleForModal = block.styleClass || ''; selectedAlignmentForModal = block.alignment || 'left';
        document.querySelectorAll('.alignment-option').forEach(opt => opt.classList.toggle('selected', opt.dataset.align === selectedAlignmentForModal));
        document.querySelectorAll('#styleOptionsModal .style-option').forEach(opt => opt.classList.toggle('selected', opt.dataset.style === selectedStyleForModal));
        let html = '';
        if (block.type === 'waveHeader') html = `<label>Título principal:</label><textarea id="wave_title" rows="3">${escapeHtml(block.content.mainTitle)}</textarea>`;
        else if (block.type === 'footer') html = `<label>Texto izquierdo:</label><input id="footer_left" value="${escapeHtml(block.content.leftText)}"><label>Texto derecho:</label><input id="footer_right" value="${escapeHtml(block.content.rightText)}">`;
        else if (block.type === 'tituloSeccion') html = `<label>Texto:</label><input id="field_text" value="${escapeHtml(block.content.text)}"><label>Icono:</label><div class="icon-selector" id="iconSelectorTitulo">${iconList.map(icon => `<div class="icon-option ${block.content.icon===icon?'selected':''}" data-icon="${icon}"><i class="fas ${icon}"></i></div>`).join('')}</div><input type="hidden" id="field_icon" value="${block.content.icon}">`;
        else if (block.type === 'cita') html = `<label>Texto:</label><textarea id="field_text" rows="3">${escapeHtml(block.content.text)}</textarea><label>Icono:</label><div class="icon-selector" id="iconSelectorCita">${iconList.map(icon => `<div class="icon-option ${block.content.icon===icon?'selected':''}" data-icon="${icon}"><i class="fas ${icon}"></i></div>`).join('')}</div><input type="hidden" id="field_icon" value="${block.content.icon}">`;
        else if (block.type === 'abeja') html = `<label>Texto:</label><input id="field_text" value="${escapeHtml(block.content.text)}">`;
        else if (block.type === 'introTexto' || block.type === 'parrafo') html = `<label>Contenido:</label><div id="richTextEditor"></div>`;
        else if (block.type === 'imagenCentral') html = `<label>URL imagen:</label><input id="field_src" value="${block.content.src}">`;
        else if (block.type === 'listaConsejos') { currentItemsList = [...(block.content.items || [])]; html = `<div id="consejosContainer"></div><button id="addNewItemBtn" class="add-item-btn">+ Agregar consejo</button>`; }
        else if (block.type === 'beneficiosGrid') { currentBeneficiosList = [...(block.content.beneficios || [])]; html = `<div id="beneficiosContainer"></div><button id="addNewBeneficioBtn" class="add-item-btn">+ Agregar beneficio</button>`; }
        else html = `<p>No editable</p>`;
        dynamicFieldsDiv.innerHTML = html;
        if (block.type === 'introTexto' || block.type === 'parrafo') window.currentRichContent = initRichTextEditor('richTextEditor', block.content.html || '');
        if (block.type === 'listaConsejos') { renderConsejosEditores(); document.getElementById('addNewItemBtn')?.addEventListener('click', () => { currentItemsList.push({ icon: 'fa-heart', html: 'Nuevo consejo' }); renderConsejosEditores(); }); }
        if (block.type === 'beneficiosGrid') renderBeneficiosList();
        if (block.type === 'tituloSeccion' || block.type === 'cita') { const sel = document.getElementById(block.type === 'tituloSeccion' ? 'iconSelectorTitulo' : 'iconSelectorCita'); const hidden = document.getElementById('field_icon'); if(sel) sel.querySelectorAll('.icon-option').forEach(opt => opt.onclick = () => { sel.querySelectorAll('.icon-option').forEach(o=>o.classList.remove('selected')); opt.classList.add('selected'); hidden.value = opt.dataset.icon; }); }
        modal.style.display = 'flex';
    }
    function saveModalEdit() {
        if(currentEditingBlockIndex === null) return;
        const block = currentBlocks[currentEditingBlockIndex];
        block.width = blockWidthInput.value.trim(); block.height = blockHeightInput.value.trim(); block.styleClass = selectedStyleForModal; block.alignment = selectedAlignmentForModal;
        if (block.type === 'waveHeader') block.content.mainTitle = document.getElementById('wave_title')?.value || 'Comunicación Afectiva<br>en la Primera Infancia';
        else if (block.type === 'footer') { block.content.leftText = document.getElementById('footer_left')?.value; block.content.rightText = document.getElementById('footer_right')?.value; }
        else if (block.type === 'tituloSeccion') block.content = { text: document.getElementById('field_text')?.value, icon: document.getElementById('field_icon')?.value };
        else if (block.type === 'cita') block.content = { text: document.getElementById('field_text')?.value, icon: document.getElementById('field_icon')?.value };
        else if (block.type === 'abeja') block.content.text = document.getElementById('field_text')?.value;
        else if (block.type === 'introTexto' || block.type === 'parrafo') if(window.currentRichContent) block.content.html = window.currentRichContent.innerHTML;
        else if (block.type === 'imagenCentral') block.content.src = document.getElementById('field_src')?.value;
        else if (block.type === 'listaConsejos') block.content.items = [...currentItemsList];
        else if (block.type === 'beneficiosGrid') block.content.beneficios = [...currentBeneficiosList];
        saveBlocks(); renderBlog(); modal.style.display = 'none'; currentEditingBlockIndex = null; window.currentRichContent = null;
    }
    function changeBlockStyle(idx) { let s = prompt('Estilo (style-round-card, style-square-card, style-floating, style-glow, vacío):', currentBlocks[idx].styleClass || ''); if(s!==null) { currentBlocks[idx].styleClass = s; saveBlocks(); renderBlog(); } }
    function resetToDefault() { if(confirm('Restaurar diseño original?')) { currentBlocks = JSON.parse(JSON.stringify(DEFAULT_BLOCKS)); saveBlocks(); renderBlog(); } }
    function exportData() { const data = JSON.stringify(currentBlocks, null, 2); const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'blog_config.json'; a.click(); URL.revokeObjectURL(url); }
    function importData(file) { const r = new FileReader(); r.onload = e => { try { const imported = JSON.parse(e.target.result); if(Array.isArray(imported)) { currentBlocks = imported; saveBlocks(); renderBlog(); alert('Importado correctamente'); } else alert('Archivo inválido'); } catch(err) { alert('Error al leer'); } }; r.readAsText(file); }
    exportBtn.onclick = exportData; importBtn.onclick = () => importFile.click(); importFile.onchange = e => { if(e.target.files.length) importData(e.target.files[0]); importFile.value = ''; };
    toggleBtn.onclick = () => { editMode = !editMode; toggleBtn.innerHTML = editMode ? '<i class="fas fa-eye-slash"></i> Modo Lectura' : '<i class="fas fa-pen-fancy"></i> Editar'; document.body.classList.toggle('edit-mode', editMode); renderBlog(); };
    resetBtn.onclick = resetToDefault; saveModal.onclick = saveModalEdit; closeModal.onclick = () => modal.style.display = 'none';
    alignmentSelectorDiv.onclick = e => { const t = e.target.closest('.alignment-option'); if(t) { selectedAlignmentForModal = t.dataset.align; document.querySelectorAll('.alignment-option').forEach(opt => opt.classList.remove('selected')); t.classList.add('selected'); } };
    styleOptionsModal.onclick = e => { const t = e.target.closest('.style-option'); if(t) { selectedStyleForModal = t.dataset.style; document.querySelectorAll('#styleOptionsModal .style-option').forEach(opt => opt.classList.remove('selected')); t.classList.add('selected'); } };
    loadBlocks(); document.body.classList.remove('edit-mode'); editMode = false;
</script>
</body>
</html>
